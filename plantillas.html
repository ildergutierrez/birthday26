<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz Cumpleaños ICC NC</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />

    <link rel="icon" href="imagenes/icon/ficon.svg" />
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/style.css" />

    <style>
        /* Estilos adicionales para el header */
        .header-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .current-date {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 15px;
            font-weight: 500;
        }

        .info-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .badge-gender {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 500;
            color: white;
        }

        .badge-male {
            background: linear-gradient(135deg, #1565c0, #1a2980);
        }

        .badge-female {
            background: linear-gradient(135deg, #d81b60, #ff6b6b);
        }

        .badge-unisex {
            background: linear-gradient(135deg, #5e35b1, #6a11cb);
        }

        /* Estilos para las animaciones */
        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <!-- ENCABEZADO ELEGANTE -->
        <div class="header-card text-center">
            <div class="mb-4">
                <i class="bi bi-balloon-heart-fill" style="font-size: 3rem; color: #e91e63"></i>
            </div>
            <h1 class="display-5 fw-bold mb-3">Feliz Cumpleaños</h1>
            <p class="lead text-muted mb-4">
                Celebrando con bendiciones y amor cristiano
            </p>

            <div class="current-date">
                <i class="bi bi-calendar-week me-2"></i>
                <span id="currentDate"></span>
            </div>

            <div class="info-badges">
                <span class="badge-gender badge-male">
                    <i class="bi bi-gender-male me-1"></i> Masculino
                </span>
                <span class="badge-gender badge-female">
                    <i class="bi bi-gender-female me-1"></i> Femenino
                </span>
                <span class="badge-gender badge-unisex">
                    <i class="bi bi-gender-ambiguous me-1"></i> Unisex
                </span>
            </div>
        </div>

        <!-- CONTENEDOR DE TARJETAS -->
        <div id="birthdayContainer" class="row justify-content-center"></div>

        <!-- PIE DE PÁGINA -->
        <div class="row mt-5">
            <div class="col-12 text-center">
                <div class="card border-0 bg-transparent">
                    <div class="card-body">
                        <p class="text-muted mb-0">
                            <i class="bi bi-heart-fill text-danger"></i>
                            Cada tarjeta incluye un mensaje único y una cita bíblica
                            especial.
                            <i class="bi bi-heart-fill text-danger"></i>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PLANTILLA MASCULINA 10 - MARINO PROFUNDO -->
         <!-- NUEVA MASCULINA 1 - AZUL REY CON DORADO -->
        <div class="birthday-template male col-lg-6 col-md-8 col-sm-10">
            <div class="birthday-wrapper">
                <div class="birthday-export"
                    style="border: none; background: #000080; padding: 20px; clip-path: polygon(5% 5%, 95% 0%, 100% 15%, 100% 85%, 95% 95%, 5% 100%, 0% 85%, 0% 15%);">
                    <div style="background: rgba(0,255,255,0.1); padding: 15px; transform: rotate(0.4deg);">
                        
                        <!-- Marco de foto con forma de rayo -->
                        <div class="birthday-image"
                            style="height: 360px; margin: 0 0 25px 0; clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%); overflow: hidden; border: 8px solid #00FFFF; transform: rotate(1deg); box-shadow: -20px 20px 30px rgba(0,255,255,0.3);">
                            <img class="birthday-img">
                            <div class="image-date" style="background: #00FFFF; color: #000080;"></div>
                        </div>

                        <div class="birthday-header" style="margin-bottom: 25px;">
                            <div class="serpentina-text"
                                style="font-size: 1.5rem; color: #00FFFF; font-weight: 800; text-shadow: 4px 4px 0 #00004A; transform: rotate(-1deg);">
                                ⚡ FELIZ<br>CUMPLEAÑOS ⚡</div>
                        </div>

                        <!-- Contenedor de mensaje con forma eléctrica -->
                        <div class="birthday-content"
                            style="background: rgba(255,255,255,0.95); clip-path: polygon(8% 0%, 92% 0%, 100% 15%, 100% 85%, 92% 100%, 8% 100%, 0% 85%, 0% 15%); padding: 25px; transform: rotate(-0.5deg);">
                            <h3 class="name" style="color: #000080; font-size: 2.4rem; text-align: center;"></h3>
                            <div
                                style="height: 4px; width: 120px; background: repeating-linear-gradient(135deg, #000080, #00FFFF); margin: 15px auto;">
                            </div>
                            <p class="message" style="color: #2c3e50; text-align: center;"></p>
                            <p class="verse"
                                style="background: rgba(0, 0, 128, 0.1); clip-path: polygon(6% 0%, 94% 0%, 100% 25%, 100% 75%, 94% 100%, 6% 100%, 0% 75%, 0% 25%); padding: 15px;">
                            </p>
                        </div>

                        <div class="birthday-decoration deco-1"
                            style="top: 5%; left: 2%; font-size: 40px; transform: rotate(-20deg);">⚡</div>
                        <div class="birthday-decoration deco-2"
                            style="top: 5%; right: 2%; font-size: 40px; transform: rotate(20deg);">💡</div>
                        <div class="birthday-decoration deco-3"
                            style="bottom: 15%; left: 2%; font-size: 40px; transform: rotate(15deg);">🔌</div>
                        <div class="birthday-decoration deco-4"
                            style="bottom: 15%; right: 2%; font-size: 40px; transform: rotate(-15deg);">💻</div>
                    </div>
                </div>
                <button class="btn download"
                    style="background: linear-gradient(135deg, #000080, #00FFFF); margin-top: 15px;">
                    <i class="bi bi-download me-2"></i> Descargar Tarjeta
                </button>
            </div>
        </div>


        <!-- ============ PLANTILLAS FEMENINAS ============ -->

        <!-- PLANTILLA FEMENINA 1 - ROSA PASTEL -->
      
    <!-- NUEVA FEMENINA 1 - ROSA PASTEL CON MARCO NUBE -->
    <div class="birthday-template female col-lg-6 col-md-8 col-sm-10">
        <div class="birthday-wrapper">
            <div class="birthday-export" style="border: 12px solid #F9C7D3;">
                <div class="birthday-header" style="height: 80px; background: #FFB6C1;">
                    <div class="serpentina" style="background: repeating-linear-gradient(45deg, #FFF0F5, #FFF0F5 10px, #FFB6C1 10px, #FFB6C1 20px);"></div>
                    <div class="serpentina-text" style="font-size: 2.2rem; color: #8B4C6E; text-shadow: 2px 2px 4px rgba(255,255,255,0.8);">🌸 ¡FELIZ CUMPLEAÑOS! 🌸</div>
                </div>

                <div class="birthday-decoration deco-1" style="top: 15%; left: 5%; font-size: 28px;">🌸</div>
                <div class="birthday-decoration deco-2" style="top: 15%; right: 5%; font-size: 28px;">🌷</div>
                <div class="birthday-decoration deco-3" style="bottom: 25%; left: 5%; font-size: 28px;">🌺</div>
                <div class="birthday-decoration deco-4" style="bottom: 25%; right: 5%; font-size: 28px;">🌼</div>

                <!-- Marco de foto con forma de nube -->
                <div class="birthday-image" style="height: 420px; margin: 20px 25px 20px; border-radius: 80% 20% 70% 30% / 30% 70% 20% 80%; overflow: hidden; border: 10px solid white; box-shadow: 0 15px 25px rgba(255,105,180,0.2);">
                    <img class="birthday-img" style="object-fit: cover; width: 100%; height: 100%;">
                    <div class="image-date" style="background: #FFB6C1; color: #8B4C6E; border-radius: 30px;"></div>
                </div>

                <!-- Contenedor de mensaje con forma de nube -->
                <div class="birthday-content" style="margin: 0 25px 30px; background: rgba(255, 255, 255, 0.95); border-radius: 150% 50% 140% 40% / 40% 120% 30% 130%; padding: 30px 25px; box-shadow: 0 10px 20px rgba(255,182,193,0.3);">
                    <h3 class="name" style="color: #D46B9E; font-size: 2.4rem; text-align: center;"></h3>
                    <div style="height: 2px; width: 80px; background: #F9C7D3; margin: 15px auto;"></div>
                    <p class="message" style="color: #7C4F5E; text-align: center; font-style: italic;"></p>
                    <p class="verse" style="background: #FFE4F0; border-radius: 100px 30px 100px 30px; padding: 15px; text-align: center;"></p>
                </div>
            </div>
            <button class="btn download" style="background: linear-gradient(135deg, #FFB6C1, #D46B9E);">
                <i class="bi bi-download me-2"></i> Descargar Tarjeta
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
